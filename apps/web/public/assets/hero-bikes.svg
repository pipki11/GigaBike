<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 400" width="1050" height="400" role="img" aria-label="A row of bicycles in the GigaBike showroom">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe9fb"></stop>
      <stop offset="0.55" stop-color="#f6f2fc"></stop>
      <stop offset="1" stop-color="#ffffff"></stop>
